<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Player</title>
    <link rel="manifest" href="/assets/manifest-CENRp6bI.json" type="application/manifest+json">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#ff4e00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drive Player">
    <meta name="application-name" content="Drive Player">
    <script type="module" crossorigin src="/assets/index-DQUNtM1t.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CrakKIjB.css">
  </head>
  <body>
    <div id="root">
      <div id="preloader" style="position: fixed; inset: 0; background-color: #0a0502; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: system-ui, -apple-system, sans-serif;">
        <div style="position: absolute; top: -10%; left: -10%; width: 50%; height: 50%; background: rgba(255, 78, 0, 0.05); filter: blur(120px); border-radius: 50%;"></div>
        <div style="position: absolute; bottom: -10%; right: -10%; width: 50%; height: 50%; background: rgba(255, 78, 0, 0.03); filter: blur(120px); border-radius: 50%;"></div>
        
        <div style="width: 80px; height: 80px; background-color: #ff4e00; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; box-shadow: 0 20px 60px rgba(255, 78, 0, 0.3); animation: pulse 2s infinite ease-in-out; position: relative;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 6s linear infinite;"><circle cx="12" cy="12" r="10"/><path d="M10 9l5 3-5 3v-6z"/></svg>
        </div>
        
        <div style="text-align: center; position: relative;">
          <div style="color: white; font-weight: 800; font-size: 16px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 12px; opacity: 0.9;">Drive Player</div>
          <div id="loader-status" style="color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; animation: pulse-text 2s infinite ease-in-out;">Carregando Atualizações...</div>
        </div>

        <style>
          @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
          @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }
          @keyframes pulse-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
          body { margin: 0; background: #0a0502; overflow: hidden; }
        </style>
      </div>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('SW registered!', reg);
              if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                window.location.reload();
              }
            })
            .catch(err => console.log('SW error!', err));
        });
        
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
